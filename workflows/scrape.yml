name: Scrape huts availability

on:
  workflow_dispatch:
  schedule:
    # Pondělí/středa/pátek ve 2:17 Praha
    - cron: "17 2 * * 1,3,5"
      timezone: "Europe/Prague"

permissions:
  contents: write

concurrency:
  group: scrape-huts
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    env:
      HUT_EMAIL: ${{ secrets.HUT_EMAIL }}
      HUT_PASSWORD: ${{ secrets.HUT_PASSWORD }}
      GITHUB_ACTIONS: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::chromote
            any::tidyverse
            any::jsonlite
            any::readxl
            any::writexl
            any::stringi

      - name: Check Chrome
        run: |
          which google-chrome || true
          which chromium || true
          which chromium-browser || true

      - name: Run scraper
        run: |
          Rscript volna_mista_na_chatach_v2.R

      - name: Convert scraper output to map JSON
        run: |
          python prepare_availability.py calendar_results.xlsx docs/availability.json docs/availability_long.csv

      - name: Commit updated availability
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add calendar_results.xlsx docs/availability.json docs/availability_long.csv

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update hut availability"
            git push
          fi
