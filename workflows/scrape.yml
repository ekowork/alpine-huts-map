name: Scrape huts availability

on:
  workflow_dispatch:
  schedule:
    # Každý druhý den ve 2:17 ráno pražského času
    - cron: "17 2 */2 * *"
      timezone: "Europe/Prague"

permissions:
  contents: write

concurrency:
  group: scrape-huts
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev \
            chromium-browser

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::dplyr
            any::readr
            any::jsonlite
            any::stringr
            any::lubridate
            any::purrr
            any::chromote
            any::rvest
            any::httr2

      - name: Run scraper
        run: |
          Rscript R/scrape_huts.R

      - name: Commit updated availability
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add docs/availability.json docs/last_run.json || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update hut availability"
            git push
          fi
