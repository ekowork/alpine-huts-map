name: Scrape huts availability

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape-huts
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      HUT_EMAIL: ${{ secrets.HUT_EMAIL }}
      HUT_PASSWORD: ${{ secrets.HUT_PASSWORD }}
      GITHUB_ACTIONS: "true"
      INPUT_HUTS_XLSX: "data/chaty.xlsx"
      MAX_HUTS: "3"
      N_MONTHS_TO_SCRAPE: "1"
      CALENDAR_RESULTS_XLSX: "data/calendar_results.xlsx"
      AVAILABILITY_JSON: "docs/availability.json"
      AVAILABILITY_LONG_CSV: "data/availability_long.csv"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::chromote
            any::tidyverse
            any::jsonlite
            any::readxl
            any::writexl
            any::stringi
            any::readr

      - name: Check Chrome
        run: |
          which google-chrome || true
          which chromium || true
          which chromium-browser || true

      - name: Run scraper and R conversion
        run: |
          Rscript R/volna_mista_na_chatach_v2.R

      - name: Commit updated availability
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/calendar_results.xlsx data/availability_long.csv docs/availability.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Smoke test hut availability"
            git push
          fi
