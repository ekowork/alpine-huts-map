name: Scrape huts availability

on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * *"

permissions:
  contents: write

concurrency:
  group: hut-scraper
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      HUT_EMAIL: ${{ secrets.HUT_EMAIL }}
      HUT_PASSWORD: ${{ secrets.HUT_PASSWORD }}
      N_MONTHS_TO_SCRAPE: "2"
      GITHUB_ACTIONS: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev libharfbuzz-dev libfribidi-dev libfontconfig1-dev libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ hashFiles('.github/workflows/scrape.yml') }}
          restore-keys: |
            ${{ runner.os }}-r-

      - name: Install R packages
        run: |
          Rscript -e '
            pkgs <- c(
              "chromote", "jsonlite", "readxl", "writexl",
              "dplyr", "purrr", "stringr", "tibble", "readr", "lubridate"
            )
            missing <- setdiff(pkgs, rownames(installed.packages()))
            if (length(missing)) install.packages(missing, repos = "https://cloud.r-project.org")
            print(setNames(pkgs %in% rownames(installed.packages()), pkgs))
          '
      - name: Set up Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
          install-dependencies: true
      
      - name: Check Chrome
        run: |
          echo "Chrome path: ${{ steps.setup-chrome.outputs.chrome-path }}"
          "${{ steps.setup-chrome.outputs.chrome-path }}" --version
        
      - name: Run scraper
        run: |
          Rscript R/volna_mista_na_chatach_v2.R

      - name: Show outputs
        if: always()
        run: |
          echo "=== data ==="
          ls -lah data || true
          echo "=== docs ==="
          ls -lah docs || true
          echo "=== availability json preview ==="
          head -c 1000 docs/availability.json || true

      - name: Upload scraper outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-output
          retention-days: 14
          path: |
            data/calendar_results.xlsx
            data/availability_long.csv
            docs/availability.json

      - name: Commit updated availability
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/availability.json data/availability_long.csv data/history/

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update hut availability data"

          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
